<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Síň megalovců 3D – základní místnost</title>
<style>
body { margin:0; overflow:hidden; background:#000; font-family:system-ui,sans-serif; }
#overlay{
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.85); color:#fff; cursor:pointer; z-index:10;
  flex-direction:column; text-align:center;
}
#hint{
  position:fixed; top:10px; left:10px; padding:6px 10px;
  font-size:13px; color:#eee; background:rgba(0,0,0,0.55);
  border-radius:4px; z-index:5;
}
</style>
</head>
<body>

<div id="overlay">
<h1>SÍŇ MEGALOVCŮ</h1>
<p>Klikni pro vstup. WASD + myš • 1/2/3 světlo</p>
</div>

<div id="hint">
WASD + myš • 1 = den • 2 = ambient • 3 = 13. století
</div>

<script type="module">
import * as THREE from './three.module.js';
import { PointerLockControls } from './PointerLockControls.js';

/* SCÉNA */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050407);
scene.fog = new THREE.FogExp2(0x050407, 0.03);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 200);
let targetFov = camera.fov;
const minFov = 5, maxFov = 90;
document.addEventListener('wheel', e=>{
  e.preventDefault();
  targetFov += e.deltaY * 0.08;
  targetFov = THREE.MathUtils.clamp(targetFov,minFov,maxFov);
},{passive:false});

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

/* ROZMĚRY */
const roomWidth=26, roomDepth=32, roomHeight=9;

/* TEXTURY */
const loader=new THREE.TextureLoader();
const texWall=loader.load('./grf/stena.jpg');
texWall.wrapS=texWall.wrapT=THREE.RepeatWrapping;
texWall.repeat.set(5,3);

const matWall=new THREE.MeshStandardMaterial({
  map:texWall, roughness:0.75, metalness:0.1
});

/* SVĚTLA */
const hemi=new THREE.HemisphereLight(0xfff0d0,0x201010,0.6);
scene.add(hemi);

const mainSpot=new THREE.SpotLight(0xffffff,1.3,120,Math.PI/4,0.4);
mainSpot.position.set(0,15,0);
mainSpot.castShadow=true;
scene.add(mainSpot);

/* PODLAHA */
const floor=new THREE.Mesh(
  new THREE.PlaneGeometry(roomWidth,roomDepth),
  new THREE.MeshStandardMaterial({color:0x555555,roughness:0.8})
);
floor.rotation.x=-Math.PI/2;
floor.receiveShadow=true;
scene.add(floor);

/* STROP */
const ceiling=new THREE.Mesh(
  new THREE.PlaneGeometry(roomWidth,roomDepth),
  new THREE.MeshStandardMaterial({color:0x333333,roughness:0.9})
);
ceiling.rotation.x=Math.PI/2;
ceiling.position.y=roomHeight;
scene.add(ceiling);

/* KOLIZE */
const colliders=[];
const colliderBoxes=[];
function addCollider(mesh){
  colliders.push(mesh);
  colliderBoxes.push(new THREE.Box3().setFromObject(mesh));
}
function updateColliders(){
  for(let i=0;i<colliders.length;i++)
    colliderBoxes[i].setFromObject(colliders[i]);
}

/* ===== NOVÁ CIHLOVÁ STĚNA ===== */
function createBrickWall(width,height,depth,x,y,z,rotY=0){

  const bottomH=height*0.10;
  const topH=height-bottomH;

  const brickW=0.25;
  const brickH=0.065;

  const bricksX=Math.round(width/brickW);
  const bricksY=Math.round(bottomH/brickH);

  const brickTextures=[
    loader.load("./grf/cihla1.jpg"),
    loader.load("./grf/cihla2.jpg"),
    loader.load("./grf/cihla3.jpg"),
    loader.load("./grf/cihla4.jpg")
  ];

  brickTextures.forEach(t=>{
    t.wrapS=t.wrapT=THREE.ClampToEdgeWrapping;
    t.anisotropy=renderer.capabilities.getMaxAnisotropy();
  });

  const group=new THREE.Group();

  for(let row=0;row<bricksY;row++){
    const offset=(row%2===1)?brickW/2:0;

    for(let col=0;col<bricksX;col++){

      const geo=new THREE.BoxGeometry(brickW,brickH,depth);
      const mat=new THREE.MeshStandardMaterial({
        map:brickTextures[Math.floor(Math.random()*brickTextures.length)],
        roughness:0.8, metalness:0.1
      });

      const brick=new THREE.Mesh(geo,mat);

      brick.position.set(
        -width/2+offset+brickW/2+col*brickW,
        -topH/2+brickH/2+row*brickH,
        0
      );

      brick.castShadow=true;
      brick.receiveShadow=true;
      group.add(brick);
    }
  }

  group.position.set(x,y,z);
  group.rotation.y=rotY;
  scene.add(group);
  addCollider(group);

  const top=new THREE.Mesh(
    new THREE.BoxGeometry(width,topH,depth),
    matWall
  );
  top.position.set(x,y+bottomH/2,z);
  top.rotation.y=rotY;
  top.castShadow=true;
  top.receiveShadow=true;
  scene.add(top);
  addCollider(top);
}

/* OBVODOVÉ STĚNY */
createBrickWall(roomWidth,roomHeight,0.6,0,roomHeight/2,-roomDepth/2);
createBrickWall(roomWidth,roomHeight,0.6,0,roomHeight/2, roomDepth/2);
createBrickWall(roomDepth,roomHeight,0.6,-roomWidth/2,roomHeight/2,0,Math.PI/2);
createBrickWall(roomDepth,roomHeight,0.6, roomWidth/2,roomHeight/2,0,Math.PI/2);

updateColliders();

/* POINTER LOCK */
const controls=new PointerLockControls(camera,document.body);
const overlay=document.getElementById('overlay');
overlay.addEventListener('click',()=>controls.lock());
controls.addEventListener('lock',()=>overlay.style.display='none');
controls.addEventListener('unlock',()=>overlay.style.display='flex');
scene.add(controls.getObject());
controls.getObject().position.set(0,2,roomDepth/2-5);

/* POHYB */
const key={};
document.addEventListener('keydown',e=>key[e.code]=true);
document.addEventListener('keyup',e=>key[e.code]=false);

const velocity=new THREE.Vector3();
const speed=4;

function move(delta){
 if(!controls.isLocked)return;
 velocity.multiplyScalar(0.85);

 const dir=new THREE.Vector3();
 camera.getWorldDirection(dir);
 dir.y=0; dir.normalize();

 const side=new THREE.Vector3().crossVectors(dir,camera.up);

 if(key['KeyW']) velocity.addScaledVector(dir,speed*delta);
 if(key['KeyS']) velocity.addScaledVector(dir,-speed*delta);
 if(key['KeyA']) velocity.addScaledVector(side,-speed*delta);
 if(key['KeyD']) velocity.addScaledVector(side,speed*delta);

 controls.getObject().position.add(velocity);
 controls.getObject().position.y=2;
}

/* ANIMACE */
const clock=new THREE.Clock();
function animate(){
 requestAnimationFrame(animate);
 const delta=clock.getDelta();
 move(delta);

 camera.fov+= (targetFov-camera.fov)*0.15;
 camera.updateProjectionMatrix();

 renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
